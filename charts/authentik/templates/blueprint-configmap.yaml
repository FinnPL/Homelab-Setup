apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-custom-blueprints
  labels:
    blueprints.goauthentik.io/instantiate: "true"
data:
  argocd-oidc.yaml: |
    version: 1
    metadata:
      name: ArgoCD OIDC Provider
    entries:
      - model: authentik_providers_oauth2.scopemapping
        id: argocd-groups-scope
        identifiers:
          managed: goauthentik.io/providers/oauth2/scope-argocd-groups
        attrs:
          name: "ArgoCD Groups"
          scope_name: groups
          expression: |
            return {
              "groups": [group.name for group in request.user.ak_groups.all()]
            }

      - model: authentik_providers_oauth2.oauth2provider
        id: argocd-provider
        identifiers:
          name: ArgoCD
        attrs:
          name: ArgoCD
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          client_type: confidential
          client_id: argocd
          client_secret: !Env [AUTHENTIK_ARGOCD_OIDC_SECRET]
          redirect_uris: |-
            https://argocd.lippok.dev/auth/callback
            http://localhost:8085/auth/callback
          sub_mode: user_email
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !KeyOf argocd-groups-scope
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]

      - model: authentik_core.application
        id: argocd-app
        identifiers:
          slug: argocd
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !KeyOf argocd-provider
          meta_launch_url: https://argocd.lippok.dev
          policy_engine_mode: any
