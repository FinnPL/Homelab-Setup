name: "Terraform: 02-infrastructure"

on:
  workflow_call:
  pull_request:
    paths:
      - "02-infrastructure/**"
      - ".github/workflows/terraform-02-infrastructure.yaml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (dangerous)"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: Terraform
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('terraform-infrastructure-pr-{0}', github.event.pull_request.number) || 'terraform-infrastructure' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: ./02-infrastructure
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      # Proxmox
      TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
      TF_VAR_proxmox_ssh_user: ${{ vars.PROXMOX_SSH_USER }}
      TF_VAR_proxmox_ssh_password: ${{ secrets.PROXMOX_SSH_PASSWORD }}
      TF_VAR_proxmox_insecure: ${{ vars.PROXMOX_INSECURE }}
      TF_VAR_proxmox_node: ${{ vars.PROXMOX_NODE }}
      TF_VAR_proxmox_ssh_private_key: ${{ secrets.PROXMOX_SSH_KEY }}
      TF_VAR_proxmox_ssh_public_key: ${{ vars.PROXMOX_SSH_PUB_KEY }}
      # Windows
      TF_VAR_windows_admin_password: ${{ secrets.WINDOWS_ADMIN_PASSWORD }}
      TF_VAR_windows_product_key: ${{ secrets.WINDOWS_PRODUCT_KEY }}
      # Talos
      TF_VAR_cluster_name: ${{ vars.TALOS_CLUSTER_NAME }}
      # GitHub Runner
      TF_VAR_github_pat: ${{ secrets.GH_PAT }}
      # NFS
      TF_VAR_nfs_root_password: ${{ secrets.NFS_ROOT_PASSWORD }}
      TF_VAR_postgres_root_password: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      # Mesh Router (WireGuard tunnel for clustermesh)
      TF_VAR_mesh_router_root_password: ${{ secrets.MESH_ROUTER_ROOT_PASSWORD }}
      TF_VAR_mesh_wg_private_key: ${{ secrets.MESH_ROUTER_WG_PRIVATE_KEY }}
      TF_VAR_mesh_wg_peer_pubkey: ${{ vars.CLOUD_WG_PUBKEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Install Ansible
        run: pip install ansible

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -lock-timeout=10m -out .planfile -input=false
        continue-on-error: true

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@2d41e908725447b1677913001dfb92fa7010c025 # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          planfile: .planfile
          working-directory: ./02-infrastructure
          header: "Terraform Plan (02-infrastructure)"

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && inputs.apply == true)
        run: terraform apply -lock-timeout=10m -auto-approve -input=false
