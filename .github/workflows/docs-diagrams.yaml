name: "Docs: D2 diagrams"

on:
  pull_request:
    paths:
      - "docs/diagrams/**/*.d2"
      - ".github/workflows/docs-diagrams.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Render the diagrams and commit the SVGs back onto the PR branch.
  render-commit:
    name: "render & commit"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}

      - name: Install D2
        env:
          # renovate: datasource=github-releases depName=terrastruct/d2
          D2_VERSION: "v0.7.1"
        run: |
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin --strip-components=2 "d2-${D2_VERSION}/bin/d2"

      - name: Render all diagrams
        run: |
          shopt -s nullglob
          for f in docs/diagrams/*.d2; do
            echo "Rendering $f"
            d2 "$f" "${f%.d2}.svg"
          done

      - name: Commit rendered SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- 'docs/diagrams/*.svg'; then
            echo "No diagram changes to commit."
            exit 0
          fi
          git add docs/diagrams/*.svg
          # [skip ci] avoids retriggering the path-based workflows on the bot commit.
          git commit -m "chore(docs): render D2 diagrams [skip ci]"
          git push
