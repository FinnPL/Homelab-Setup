apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 2.3.3
    helm:
      valuesObject:
        podSecurityContextCrossplane:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        securityContextCrossplane:
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        podSecurityContextRBACManager:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        securityContextRBACManager:
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
