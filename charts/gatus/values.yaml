gatus:
  env:
    DISCORD_WEBHOOK_URL:
      valueFrom:
        secretKeyRef:
          name: gatus-secrets
          key: webhook-url
    GATUS_DB_HOST:
      valueFrom:
        secretKeyRef:
          name: gatus-db-credentials
          key: endpoint
    GATUS_DB_PORT:
      valueFrom:
        secretKeyRef:
          name: gatus-db-credentials
          key: port
    GATUS_DB_USER:
      valueFrom:
        secretKeyRef:
          name: gatus-db-credentials
          key: username
    GATUS_DB_PASS:
      valueFrom:
        secretKeyRef:
          name: gatus-db-credentials
          key: password

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

  config:
    storage:
      type: postgres
      path: "postgres://${GATUS_DB_USER}:${GATUS_DB_PASS}@${GATUS_DB_HOST}:${GATUS_DB_PORT}/gatus-db?sslmode=require"

    alerting:
      discord:
        webhook-url: "${DISCORD_WEBHOOK_URL}"

    endpoints:
      # Mail Servers
      - name: "Mail Server"
        group: "Mail"
        url: "icmp://mail.lippok.eu"
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Mail Server HTTPS"
        group: "Mail"
        url: "https://mail.lippok.eu"
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 24h"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Mail IMAP"
        group: "Mail"
        url: "tcp://mail.lippok.eu:993"
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Mail SMTP"
        group: "Mail"
        url: "tcp://mail.lippok.eu:587"
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      # NAS
      - name: "Apollo NAS"
        group: "NAS"
        url: "https://apollo.lippok.dev"
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 24h"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Apollo NAS Ping"
        group: "NAS"
        url: "icmp://apollo.athena"
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Zeus NAS"
        group: "NAS"
        url: "https://zeus.lippok.dev"
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 24h"
        alerts:
          - type: discord
            failure-threshold: 3
            success-threshold: 2

      - name: "Zeus NAS Ping"
        group: "NAS"
