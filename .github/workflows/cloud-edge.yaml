name: "Cloud Edge"

on:
  pull_request:
    paths:
      - "cloud-edge/**"
      - ".github/workflows/cloud-edge.yaml"
  push:
    branches: [main]
    paths:
      - "cloud-edge/**"
      - ".github/workflows/cloud-edge.yaml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        type: boolean
        default: false
      deploy_nixos:
        description: "Run nixos-rebuild (config update)"
        type: boolean
        default: false
      force_install_nixos:
        description: "Force nixos-anywhere install (manual, bypasses fresh-VM proof)"
        type: boolean
        default: false
      instance_availability_domain:
        description: "Optional OCI availability domain override (example: kIdk:EU-FRANKFURT-1-AD-2)"
        type: string
        default: ""
      replace_target:
        description: "Optional Terraform resource address to force-replace on apply. Only honored when apply=true."
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

# Terraform: provisions OCI infrastructure + Cloudflare DNS
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      nixos: ${{ steps.filter.outputs.nixos }}
      workflow_logic: ${{ steps.filter.outputs.workflow_logic }}
      k3s_services: ${{ steps.filter.outputs.k3s_services }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - 'cloud-edge/**/*.tf'
              - 'cloud-edge/.terraform.lock.hcl'
              - '!cloud-edge/k3s-services/**'
            nixos:
              - 'cloud-edge/nixos/**'
            workflow_logic:
              - '.github/workflows/cloud-edge.yaml'
              - 'cloud-edge/scripts/gha/**'
            k3s_services:
              - 'cloud-edge/k3s-services/**'

  terraform:
    needs: changes
    if: |
      needs.changes.outputs.terraform == 'true' ||
      github.event_name == 'workflow_dispatch'
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: Terraform
    outputs:
      instance_action: ${{ steps.edge_plan.outputs.instance_action }}
      instance_new: ${{ steps.edge_plan.outputs.instance_new }}
    concurrency:
      group: terraform-cloud-edge
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ./cloud-edge
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ vars.OCI_REGION }}
      TF_VAR_oci_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      TF_VAR_ssh_public_key: ${{ vars.OCI_SSH_PUBLIC_KEY }}
      TF_VAR_instance_availability_domain: ${{ github.event_name == 'workflow_dispatch' && inputs.instance_availability_domain || '' }}
      REPLACE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.replace_target || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          extra_args=()
          if [ -n "${REPLACE_TARGET:-}" ]; then
            echo "::notice::Planning with -replace=${REPLACE_TARGET}"
            extra_args+=(-replace="${REPLACE_TARGET}")
          fi
          terraform plan -lock-timeout=10m -out .planfile -input=false "${extra_args[@]}"
        continue-on-error: true

      - name: Detect edge instance lifecycle action
        id: edge_plan
        if: steps.plan.outcome == 'success'
        run: bash ./scripts/gha/cloud-edge-workflow.sh detect-instance-action

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          planfile: .planfile
          working-directory: ./cloud-edge
          header: "Terraform Plan (cloud-edge)"

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && inputs.apply == true)
        env:
          EDGE_INSTANCE_NEW: ${{ steps.edge_plan.outputs.instance_new }}
        run: |
          extra_args=()
          if [ -n "${REPLACE_TARGET:-}" ]; then
            echo "::notice::Applying with -replace=${REPLACE_TARGET}"
            extra_args+=(-replace="${REPLACE_TARGET}")
          fi
          if [ "${EDGE_INSTANCE_NEW:-false}" = "true" ]; then
            bash ./scripts/gha/cloud-edge-workflow.sh terraform-apply-with-ad-fallback
          else
            terraform apply -lock-timeout=10m -auto-approve -input=false "${extra_args[@]}"
          fi

  validate-nixos:
    needs: changes
    if: |
      needs.changes.outputs.nixos == 'true' ||
      needs.changes.outputs.terraform == 'true' ||
      needs.changes.outputs.workflow_logic == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.apply || inputs.deploy_nixos || inputs.force_install_nixos))
    name: "Validate NixOS"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow helper script syntax
        run: bash -n ./cloud-edge/scripts/gha/cloud-edge-workflow.sh

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Nix flake
        run: nix flake show ./cloud-edge/nixos --no-write-lock-file >/dev/null

      - name: Evaluate oracle-edge configuration
        run: |
          nix eval ./cloud-edge/nixos#nixosConfigurations.oracle-edge.config.system.build.toplevel.drvPath \
            --raw \
            --no-write-lock-file \
            >/dev/null

  # NixOS Deploy: installs or updates NixOS on the edge node
  deploy-nixos:
    needs: [changes, terraform, validate-nixos]
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      (needs['validate-nixos'].result == 'success' || needs['validate-nixos'].result == 'skipped') &&
      (
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          (
            needs.changes.outputs.nixos == 'true' ||
            needs.terraform.outputs.instance_new == 'true'
          )
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          (
            inputs.deploy_nixos ||
            (inputs.apply && needs.terraform.outputs.instance_new == 'true') ||
            inputs.force_install_nixos
          )
        )
      )
    name: "NixOS Deploy"
    runs-on: ubuntu-latest
    environment: Terraform
    concurrency:
      group: nixos-cloud-edge
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Validate dispatch mode
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.apply }}" = "true" ] && [ "${{ inputs.deploy_nixos }}" = "true" ]; then
            echo "::error::Choose only one mode for manual runs: apply or deploy_nixos"
            exit 1
          fi

          if [ "${{ inputs.apply }}" = "true" ] && [ "${{ inputs.force_install_nixos }}" = "true" ]; then
            echo "::error::Choose only one install mode: apply or force_install_nixos"
            exit 1
          fi

          if [ "${{ inputs.deploy_nixos }}" = "true" ] && [ "${{ inputs.force_install_nixos }}" = "true" ]; then
            echo "::error::Choose only one NixOS mode: deploy_nixos or force_install_nixos"
            exit 1
          fi

      - name: Prepare edge host context
        id: edge
        working-directory: ./cloud-edge
        env:
          TF_IN_AUTOMATION: "true"
          TF_INPUT: "false"
          EXPECTED_FP: ${{ secrets.OCI_EDGE_SSH_HOSTKEY_SHA256 }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./scripts/gha/cloud-edge-workflow.sh prepare-edge-host

      - name: Write SSH keys for NixOS
        env:
          OCI_SSH_PUBLIC_KEY: ${{ vars.OCI_SSH_PUBLIC_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh write-ssh-keys-nix

      # First-time install (nixos-anywhere) when Terraform proved a new VM
      - name: Guard install when target already has NixOS
        if: |
          (
            (
              (
                (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
                (github.event_name == 'workflow_dispatch' && inputs.apply)
              ) &&
              needs.terraform.outputs.instance_new == 'true'
            ) ||
            (github.event_name == 'workflow_dispatch' && inputs.force_install_nixos)
          ) &&
          steps.edge.outputs.nixos_state == 'installed'
        run: |
          echo "::error::Terraform reported a new VM, but target already reports NixOS installed."
          echo "::error::Aborting to avoid acting on the wrong host."
          exit 1

      - name: Guard install when target state is unknown
        if: |
          (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' && inputs.apply)
          ) &&
          needs.terraform.outputs.instance_new == 'true' &&
          steps.edge.outputs.nixos_state == 'unknown'
        run: |
          echo "::error::Terraform reported a new VM, but SSH state verification is unknown."
          echo "::error::Fix SSH/host reachability and rerun."
          exit 1

      - name: "Install NixOS On New VM"
        if: |
          (
            (
              (
                (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
                (github.event_name == 'workflow_dispatch' && inputs.apply)
              ) &&
              needs.terraform.outputs.instance_new == 'true' &&
              steps.edge.outputs.nixos_state == 'absent'
            ) ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.force_install_nixos &&
              steps.edge.outputs.nixos_state != 'installed'
            )
          )
        run: |
          echo "Running nixos-anywhere on ${{ steps.edge.outputs.ip }}..."
          # renovate: datasource=github-tags depName=nix-community/nixos-anywhere versioning=semver
          nix run github:nix-community/nixos-anywhere/1.13.0 -- \
            --flake ./cloud-edge/nixos#oracle-edge \
            --build-on-remote \
            -i ~/.ssh/edge_key \
            root@${{ steps.edge.outputs.ip }}

      - name: Guard deploy when NixOS is missing
        if: |
          ((needs.changes.outputs.nixos == 'true' && github.ref == 'refs/heads/main' && needs.terraform.outputs.instance_new != 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_nixos)) &&
          steps.edge.outputs.nixos_state != 'installed'
        run: |
          if [ "${{ steps.edge.outputs.nixos_state }}" = "unknown" ]; then
            echo "::error::deploy_nixos path selected, but target state is unknown (SSH verification failed)."
            echo "::error::Fix SSH/host reachability first, then rerun deploy_nixos."
          else
            echo "::error::deploy_nixos path selected, but NixOS was not detected on target."
          fi
          exit 1

      - name: Refresh SSH after NixOS install
        if: |
          (
            (
              (
                (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
                (github.event_name == 'workflow_dispatch' && inputs.apply)
              ) &&
              needs.terraform.outputs.instance_new == 'true' &&
              steps.edge.outputs.nixos_state == 'absent'
            ) ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.force_install_nixos &&
              steps.edge.outputs.nixos_state != 'installed'
            )
          )
        env:
          IP: ${{ steps.edge.outputs.ip }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh refresh-ssh-after-install

      # Tailscale auth key
      - name: Deploy Tailscale credentials
        env:
          IP: ${{ steps.edge.outputs.ip }}
          TAILSCALE_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh deploy-tailscale-credentials

      # WireGuard keys for clustermesh tunnel
      - name: Deploy WireGuard keys
        env:
          IP: ${{ steps.edge.outputs.ip }}
          WG_PRIVATE_KEY: ${{ secrets.CLOUD_WG_PRIVATE_KEY }}
          WG_PEER_PUBKEY: ${{ secrets.MESH_ROUTER_WG_PUBKEY }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh deploy-wireguard-keys

      # Config update (nixos-rebuild)
      - name: "Update NixOS (nixos-rebuild)"
        if: |
          (needs.changes.outputs.nixos == 'true' && github.ref == 'refs/heads/main' && needs.terraform.outputs.instance_new != 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_nixos)
        env:
          IP: ${{ steps.edge.outputs.ip }}
        run: |
          echo "Deploying NixOS config to $IP via nixos-rebuild remote mode..."

          # Keep deploy transport explicit and strict for all SSH calls done by nixos-rebuild.
          export NIX_SSHOPTS="-i ~/.ssh/edge_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          # renovate: datasource=git-refs depName=nixpkgs packageName=https://github.com/NixOS/nixpkgs ref=master versioning=git
          nix run github:NixOS/nixpkgs/f37d14db4e7f801872506a2dee5cce5da36ea512#nixos-rebuild -- \
            switch \
            --flake ./cloud-edge/nixos#oracle-edge \
            --build-host root@$IP \
            --target-host root@$IP \
            --fast

      - name: Wait for Tailscale to connect
        id: tailscale
        env:
          IP: ${{ steps.edge.outputs.ip }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh wait-for-tailscale

      - name: Wait for WireGuard tunnel
        env:
          IP: ${{ steps.edge.outputs.ip }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh wait-for-wireguard

      - name: Wait for K3s API
        env:
          IP: ${{ steps.edge.outputs.ip }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./cloud-edge/scripts/gha/cloud-edge-workflow.sh wait-for-k3s

  # K3s Services: deploys Cilium and platform services onto the cloud K3s cluster
  k3s-services:
    needs: [changes, deploy-nixos]
    if: |
      always() &&
      needs['deploy-nixos'].result != 'failure' && needs['deploy-nixos'].result != 'cancelled' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          (needs.changes.outputs.k3s_services == 'true' || needs['deploy-nixos'].result == 'success')
        ) ||
        (github.event_name == 'workflow_dispatch' && (inputs.apply || inputs.deploy_nixos))
      )
    name: "K3s Services"
    runs-on: ubuntu-latest
    environment: Terraform
    concurrency:
      group: k3s-services-cloud-edge
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ./cloud-edge/k3s-services
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_acme_email: ${{ vars.ACME_EMAIL }}

    steps:
      - uses: actions/checkout@v6

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Prepare edge host context
        id: edge
        working-directory: ./cloud-edge
        env:
          TF_IN_AUTOMATION: "true"
          TF_INPUT: "false"
          EXPECTED_FP: ${{ secrets.OCI_EDGE_SSH_HOSTKEY_SHA256 }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./scripts/gha/cloud-edge-workflow.sh prepare-edge-host

      - name: Fetch K3s kubeconfig
        working-directory: ./cloud-edge
        env:
          IP: ${{ steps.edge.outputs.ip }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./scripts/gha/cloud-edge-workflow.sh fetch-kubeconfig

      - name: Establish SSH tunnel to K3s API
        working-directory: ./cloud-edge
        env:
          IP: ${{ steps.edge.outputs.ip }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: bash ./scripts/gha/cloud-edge-workflow.sh setup-k3s-tunnel 
        
      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan
        id: plan
        run: terraform plan -lock-timeout=10m -out .planfile -input=false

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch')
        run: terraform apply -lock-timeout=10m -auto-approve -input=false

      # Cluster Mesh bootstrap: connect the two Cilium clusters (idempotent)
      - name: Install Cilium CLI
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch')
        run: |
          CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
          curl -L --fail --remote-name-all \
            "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz{,.sha256sum}"
          sha256sum --check cilium-linux-amd64.tar.gz.sha256sum
          sudo tar xzvfC cilium-linux-amd64.tar.gz /usr/local/bin
          rm cilium-linux-amd64.tar.gz{,.sha256sum}

      - name: Extract homelab kubeconfig
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch')
        working-directory: ./02-infrastructure
        run: |
          terraform init -upgrade
          terraform output -raw kubeconfig > /tmp/homelab-kubeconfig.yaml
          chmod 600 /tmp/homelab-kubeconfig.yaml

      - name: Bootstrap Cluster Mesh
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch')
        env:
          IP: ${{ steps.edge.outputs.private_ip }}
        run: |
          set -euo pipefail

          KUBECONFIG_CLOUD="kubeconfig.yaml"
          KUBECONFIG_HOMELAB="/tmp/homelab-kubeconfig.yaml"

          # Cilium-cli no longer accepts source/destination kubeconfig flags 
          rewrite_kc() {
            local file="$1" name="$2"
            yq -i "
              .clusters[0].name = \"$name\" |
              .users[0].name = \"$name\" |
              .contexts[0].name = \"$name\" |
              .contexts[0].context.cluster = \"$name\" |
              .contexts[0].context.user = \"$name\" |
              .\"current-context\" = \"$name\"
            " "$file"
          }

          cp "$KUBECONFIG_HOMELAB" /tmp/kc-homelab.yaml
          cp "$KUBECONFIG_CLOUD"   /tmp/kc-cloud.yaml
          chmod 600 /tmp/kc-homelab.yaml /tmp/kc-cloud.yaml
          rewrite_kc /tmp/kc-homelab.yaml homelab-k8s
          rewrite_kc /tmp/kc-cloud.yaml   cloud-edge

          KUBECONFIG=/tmp/kc-homelab.yaml:/tmp/kc-cloud.yaml \
            kubectl config view --flatten > /tmp/kc-merged.yaml
          chmod 600 /tmp/kc-merged.yaml
          export KUBECONFIG=/tmp/kc-merged.yaml

          # Get the NodePort assigned to the clustermesh-apiserver on the cloud cluster (with retries for operator delay)
          MESH_PORT=""
          for i in {1..24}; do
            MESH_PORT=$(kubectl --context cloud-edge -n kube-system get svc clustermesh-apiserver \
              -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "")
            if [ -n "$MESH_PORT" ]; then break; fi
            echo "Waiting for clustermesh-apiserver service... ($i/24)"
            sleep 5
          done

          if [ -z "$MESH_PORT" ]; then
            echo "::error::clustermesh-apiserver Service never appeared on the cloud cluster."
            echo "::error::Check that helm_release.cilium applied with clustermesh.useAPIServer=true."
            exit 1
          fi

          # If both sides already report ready, skip the connect call entirely
          # so reruns are clean no-ops instead of churning the secret.
          ALREADY_CONNECTED=0
          if cilium clustermesh status --context homelab-k8s --wait=false 2>/dev/null \
               | grep -q "1/1 remote clusters ready" \
             && cilium clustermesh status --context cloud-edge --wait=false 2>/dev/null \
               | grep -q "1/1 remote clusters ready"; then
            ALREADY_CONNECTED=1
          fi

          if [ "$ALREADY_CONNECTED" = "1" ]; then
            echo "Cluster Mesh already connected (both sides report 1/1 remote clusters ready). Skipping connect."
          else
            echo "Connecting clusters via Cluster Mesh (cloud endpoint: $IP:$MESH_PORT)..."
            # --allow-mismatching-ca: each cluster's Cilium generates its own
            # CA, so the connect helper has to bridge them on first install.
            # Without this flag the very first bootstrap fails.
            cilium clustermesh connect \
              --context homelab-k8s \
              --destination-context cloud-edge \
              --destination-endpoint "$IP:$MESH_PORT" \
              --allow-mismatching-ca
          fi

          echo "Waiting for both sides to report ready..."
          cilium clustermesh status --context homelab-k8s --wait --wait-duration 5m
          cilium clustermesh status --context cloud-edge --wait --wait-duration 5m

          echo "Cluster Mesh bootstrap complete."

