{{- $namespace := .Values.namespace -}}
{{- $gateway := .Values.gateway -}}
{{- range .Values.staticBackends }}
{{- $backend := . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $backend.name }}-external
  namespace: {{ $namespace }}
spec:
  ports:
    - name: http
      port: {{ $backend.servicePort }}
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ $backend.name }}-external
  namespace: {{ $namespace }}
  labels:
    kubernetes.io/service-name: {{ $backend.name }}-external
addressType: IPv4
ports:
  - name: http
    port: {{ $backend.servicePort }}
    protocol: TCP
endpoints:
  - addresses:
{{- range $backend.endpoints }}
      - {{ . | quote }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $backend.name }}
  namespace: {{ $namespace }}
spec:
  parentRefs:
    - name: {{ $gateway.name }}
      namespace: {{ $gateway.namespace }}
      sectionName: {{ $gateway.sectionName }}
  hostnames:
    - {{ $backend.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ $backend.name }}-external
          port: {{ $backend.servicePort }}
---
{{- end }}
