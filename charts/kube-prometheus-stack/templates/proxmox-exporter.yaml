{{- if .Values.proxmoxExporter.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.proxmoxExporter.secret.name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Values.proxmoxExporter.secret.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: pve-user
      remoteRef:
        key: {{ .Values.proxmoxExporter.secret.remoteKey }}
        property: user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: pve-token-name
      remoteRef:
        key: {{ .Values.proxmoxExporter.secret.remoteKey }}
        property: token-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: pve-token-value
      remoteRef:
        key: {{ .Values.proxmoxExporter.secret.remoteKey }}
        property: token-value
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxmox-exporter
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/part-of: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxmox-exporter
        app.kubernetes.io/part-of: monitoring-stack
    spec:
      containers:
        - name: exporter
          image: "{{ .Values.proxmoxExporter.image.repository }}:{{ .Values.proxmoxExporter.image.tag }}"
          imagePullPolicy: {{ .Values.proxmoxExporter.image.pullPolicy }}
          env:
            - name: PVE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxmoxExporter.secret.name }}
                  key: pve-user
            - name: PVE_TOKEN_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxmoxExporter.secret.name }}
                  key: pve-token-name
            - name: PVE_TOKEN_VALUE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxmoxExporter.secret.name }}
                  key: pve-token-value
            - name: PVE_VERIFY_SSL
              value: {{ ternary "true" "false" .Values.proxmoxExporter.verifySsl | quote }}
            - name: PVE_MODULE
              value: {{ .Values.proxmoxExporter.metrics.module | quote }}
          ports:
            - name: http
              containerPort: 9221
              protocol: TCP
          resources:
{{ toYaml .Values.proxmoxExporter.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-exporter
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/part-of: monitoring-stack
spec:
  selector:
    app.kubernetes.io/name: proxmox-exporter
  ports:
    - name: http
      port: {{ .Values.proxmoxExporter.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.proxmoxExporter.metrics.path }}
      interval: {{ .Values.proxmoxExporter.metrics.interval }}
      scrapeTimeout: {{ .Values.proxmoxExporter.metrics.scrapeTimeout }}
      params:
        module:
          - {{ .Values.proxmoxExporter.metrics.module | quote }}
        target:
          - {{ .Values.proxmoxExporter.target | quote }}
        cluster:
          - {{ .Values.proxmoxExporter.metrics.cluster | quote }}
        node:
          - {{ .Values.proxmoxExporter.metrics.node | quote }}
      relabelings:
        - sourceLabels:
            - __param_target
          action: replace
          targetLabel: instance
{{- end }}
