kube-prometheus-stack:
  defaultRules:
    rules:
      kubeProxy: false

  kubeProxy:
    enabled: false

  prometheus:
    prometheusSpec:
      externalUrl: https://prometheus.lippok.dev
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: "OnRootMismatch"
        
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 1024Mi
          cpu: 1000m
      nodeSelector:
        dedicated: database
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: "OnRootMismatch"
        
      resources:
        requests:
          memory: 50Mi
          cpu: 10m
        limits:
          memory: 100Mi
          cpu: 100m
      nodeSelector:
        dedicated: database
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi

      externalUrl: https://alerts.lippok.dev
      
      secrets:
        - alertmanager-discord

    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['namespace', 'alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'discord'
        routes:
          - receiver: 'discord'
            matchers:
              - severity =~ "warning|critical"
      receivers:
        - name: 'discord'
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-discord/discord.url
              send_resolved: true
              username: 'Alertmanager'
              color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
              title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
              title_link: 'https://alerts.lippok.dev/#/alerts?receiver={{ .Receiver }}'
              text: |-
                {{- range .Alerts }}
                **Severity:** `{{ .Labels.severity | toUpper }}`
                **Description:** {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}{{ .Annotations.summary | default "N/A" }}{{ end }}
                
                **Target Details:**
                {{- if .Labels.namespace }}
                - **Namespace:** `{{ .Labels.namespace }}`{{ end }}
                {{- if .Labels.pod }}
                - **Pod:** `{{ .Labels.pod }}`{{ end }}
                {{- if .Labels.node }}
                - **Node:** `{{ .Labels.node }}`{{ end }}
                {{- if .Labels.job }}
                - **Job:** `{{ .Labels.job }}`{{ end }}
                
                **Links:**
                [Prometheus Graph]({{ .GeneratorURL }}) {{- if .Annotations.runbook_url }} | [Runbook]({{ .Annotations.runbook_url }}){{ end }}
                
                ---
                {{- end }}

  grafana:
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
    persistence:
      enabled: false 
    envValueFrom:
      DB_HOST:
        secretKeyRef:
          name: grafana-db-credentials
          key: endpoint
      DB_PORT:
        secretKeyRef:
          name: grafana-db-credentials
          key: port
      DB_USER:
        secretKeyRef:
          name: grafana-db-credentials
          key: username
      DB_PASSWORD:
        secretKeyRef:
          name: grafana-db-credentials
          key: password
      GRAFANA_OIDC_SECRET:
        secretKeyRef:
          name: grafana-secrets
          key: client-secret

    grafana.ini:
      server:
        domain: grafana.lippok.dev
        root_url: https://grafana.lippok.dev/
        router_logging: false
      database:
        type: postgres
        host: $__env{DB_HOST}:$__env{DB_PORT}
        name: grafana-db
        user: $__env{DB_USER}
        password: $__env{DB_PASSWORD}
        ssl_mode: require
      auth.generic_oauth:
        enabled: true
        name: Authentik
        allow_sign_up: true
        client_id: grafana
        client_secret: $__env{GRAFANA_OIDC_SECRET}
        scopes: openid email profile groups
        auth_url: https://auth.lippok.dev/application/o/authorize/
        token_url: https://auth.lippok.dev/application/o/token/
        api_url: https://auth.lippok.dev/application/o/userinfo/
        role_attribute_path: contains(groups, 'authentik Admins') && 'GrafanaAdmin' || 'Viewer'
      log:
        mode: console
        level: info
        filters: tsdb.loki:warn

proxmoxExporter:
  enabled: true
  image:
    repository: prompve/prometheus-pve-exporter
    # renovate: datasource=docker depName=prompve/prometheus-pve-exporter
    tag: 3.8.1
    pullPolicy: IfNotPresent

  # Proxmox VE host to scrape via /pve?target=<host>
  target: nuc.athena
  verifySsl: false

  service:
    port: 9221

  metrics:
    path: /pve
    module: default
    cluster: "1"
    node: "1"
    interval: 30s
    scrapeTimeout: 15s

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  secret:
    name: proxmox-exporter-secrets
    remoteKey: proxmox-exporter

unifiExporter:
  enabled: true
  image:
    repository: ghcr.io/unpoller/unpoller
    # renovate: datasource=docker depName=ghcr.io/unpoller/unpoller
    tag: v2.34.0
    pullPolicy: IfNotPresent

  verifySsl: false

  defaults:
    saveSites: true

  controllers:
    - role: vieta
      url: https://10.10.0.1
      sites:
        - all
    - role: minerva
      url: https://10.0.0.1
      sites:
        - all

  service:
    port: 9130

  metrics:
    namespace: unpoller
    path: /metrics
    interval: 30s
    scrapeTimeout: 15s

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

  secret:
    name: unifi-exporter-secrets
    remoteKey: unifi-exporter
