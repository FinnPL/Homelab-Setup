alloy-agent:
  enabled: true
  alloy:
    resources:
      limits:
        memory: "256Mi"
        cpu: "500m"
      requests:
        memory: "128Mi"
        cpu: "100m"

    clustering:
      enabled: false

    storagePath: /var/lib/alloy/data

    mounts:
      extra:
        - name: alloy-data
          mountPath: /var/lib/alloy/data

        - name: varlogpods
          mountPath: /var/log/pods
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true

    extraPorts:
      - name: syslog
        port: 5140
        targetPort: 5140
        protocol: UDP
        hostPort: 5140

    configMap:
      content: |
        logging {
          level  = "info"
          format = "logfmt"
        }

        loki.source.syslog "talos" {
          listener {
            address  = "127.0.0.1:5140"
            protocol = "udp"
            labels   = { job = "talos-syslog" }
          }
          forward_to = [loki.write.default.receiver]
        }

        discovery.kubernetes "pods" {
          role = "pod"
          selectors {
            role  = "pod"
            field = "spec.nodeName=" + env("HOSTNAME")
          }
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          // 1. Map all Kubernetes pod labels into Loki log stream labels
          rule {
            action = "labelmap"
            regex  = "__meta_kubernetes_pod_label_(.+)"
          }

          // 2. Explicitly label the namespace, pod name, and container
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // 3. Construct the actual log file path on disk for Containerd
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            action        = "replace"
            regex         = "(.*);(.*);(.*);(.*)"
            target_label  = "__path__"
            replacement   = "/var/log/pods/$1_$2_$3/$4/*.log"
          }
        }

        local.file_match "pod_logs" {
          path_targets = discovery.relabel.pods.output
        }

        loki.source.file "pod_logs" {
          targets    = local.file_match.pod_logs.targets
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
          }
        }

  controller:
    type: daemonset
    hostNetwork: true
    volumes:
      extra:
        - name: alloy-data
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlog
          hostPath:
            path: /var/log

alloy-receiver:
  enabled: true
  alloy:
    clustering:
      enabled: false

    configMap:
      content: |
        logging {
          level  = "info"
          format = "logfmt"
        }

        loki.source.kubernetes_events "events" {
          job_name   = "kubernetes-events"
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
          }
        }

  rbac:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["get", "list", "watch"]

  controller:
    type: statefulset
    replicas: 1
    nodeSelector:
      dedicated: "database"
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"

  ingress:
    enabled: false
  
  service:
    type: ClusterIP
