name: "Vieta: deploy"

# Single entrypoint for all four Terraform layers.
#   push to main      -> plan + apply only the changed layers, in order
#   pull_request      -> plan + comment the changed layers
#   workflow_dispatch -> manually run/apply a chosen layer (or all)

on:
  push:
    branches:
      - main
    paths:
      - "00-global/**"
      - "01-network/**"
      - "02-infrastructure/**"
      - "03-services/**"
      - ".github/workflows/vieta-deploy.yaml"
      - ".github/workflows/_terraform-layer.yaml"
  pull_request:
    paths:
      - "00-global/**"
      - "01-network/**"
      - "02-infrastructure/**"
      - "03-services/**"
      - ".github/workflows/vieta-deploy.yaml"
      - ".github/workflows/_terraform-layer.yaml"
  workflow_dispatch:
    inputs:
      layer:
        description: "Layer to run"
        type: choice
        default: all
        options:
          - all
          - 00-global
          - 01-network
          - 02-infrastructure
          - 03-services
      apply:
        description: "Run terraform apply (dangerous)"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      global: ${{ steps.filter.outputs.global }}
      network: ${{ steps.filter.outputs.network }}
      infra: ${{ steps.filter.outputs.infra }}
      services: ${{ steps.filter.outputs.services }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            global:
              - '00-global/**'
            network:
              - '01-network/**'
            infra:
              - '02-infrastructure/**'
            services:
              - '03-services/**'

  deploy-global:
    needs: changes
    if: |
      (github.event_name != 'workflow_dispatch' && needs.changes.outputs.global == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.layer == 'all' || inputs.layer == '00-global'))
    uses: ./.github/workflows/_terraform-layer.yaml
    secrets: inherit
    with:
      layer: 00-global
      apply: ${{ github.event_name == 'workflow_dispatch' && inputs.apply || false }}

  deploy-network:
    needs: [changes, deploy-global]
    if: |
      always() &&
      (needs.deploy-global.result == 'success' || needs.deploy-global.result == 'skipped') &&
      (
        (github.event_name != 'workflow_dispatch' && needs.changes.outputs.network == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.layer == 'all' || inputs.layer == '01-network'))
      )
    uses: ./.github/workflows/_terraform-layer.yaml
    secrets: inherit
    with:
      layer: 01-network
      needs_homelab: true
      apply: ${{ github.event_name == 'workflow_dispatch' && inputs.apply || false }}

  deploy-infra:
    needs: [changes, deploy-network]
    if: |
      always() &&
      (needs.deploy-network.result == 'success' || needs.deploy-network.result == 'skipped') &&
      (
        (github.event_name != 'workflow_dispatch' && needs.changes.outputs.infra == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.layer == 'all' || inputs.layer == '02-infrastructure'))
      )
    uses: ./.github/workflows/_terraform-layer.yaml
    secrets: inherit
    with:
      layer: 02-infrastructure
      needs_homelab: true
      needs_ansible: true
      init_upgrade: true
      apply: ${{ github.event_name == 'workflow_dispatch' && inputs.apply || false }}

  deploy-services:
    needs: [changes, deploy-infra]
    if: |
      always() &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') &&
      (
        (github.event_name != 'workflow_dispatch' && needs.changes.outputs.services == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.layer == 'all' || inputs.layer == '03-services'))
      )
    uses: ./.github/workflows/_terraform-layer.yaml
    secrets: inherit
    with:
      layer: 03-services
      needs_homelab: true
      init_upgrade: true
      apply: ${{ github.event_name == 'workflow_dispatch' && inputs.apply || false }}
