apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: local-path-storage-helper-pod
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      On-demand busybox helper pods spawned by local-path-provisioner mount
      the node's local-path directory (hostPath), run mkdir/chown as root with
      a writable rootfs, and have no resources/securityContext fields set by
      the provisioner script. The controller pod itself is policy-compliant
      via chart values.
spec:
  match:
    any:
      - resources:
          namespaces: [local-path-storage]
          kinds: [Pod]
          names: [helper-pod-*]
  exceptions:
    - policyName: require-resource-limits
      ruleNames:
        - require-limits
        - autogen-require-limits
    - policyName: require-ro-rootfs
      ruleNames:
        - require-ro-rootfs
        - autogen-require-ro-rootfs
    - policyName: disallow-host-path
      ruleNames:
        - host-path
        - autogen-host-path
    - policyName: restrict-volume-types
      ruleNames:
        - restricted-volumes
        - autogen-restricted-volumes
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all, adding-capabilities-strict, autogen-adding-capabilities-strict]
    - policyName: disallow-privilege-escalation
      ruleNames: [privilege-escalation, autogen-privilege-escalation]
    - policyName: require-run-as-nonroot
      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: restrict-seccomp-strict
      ruleNames: [check-seccomp-strict, autogen-check-seccomp-strict]
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kube-system-cilium-agent
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      cilium-agent is the CNI and requires hostNetwork, hostPID,
      privileged, CAP_NET_ADMIN/SYS_ADMIN, hostPath mounts (/sys/fs/bpf,
      /var/run/cilium, /proc), seccomp Unconfined for bpf syscalls, and
      writable rootfs for in-place config updates. Resource limits are
      intentionally omitted.
spec:
  match:
    any:
      - resources:
          namespaces: [kube-system]
          kinds: [Pod, DaemonSet]
          selector:
            matchLabels:
              k8s-app: cilium
  exceptions:
    - policyName: disallow-capabilities
      ruleNames: [adding-capabilities, autogen-adding-capabilities]
    - policyName: disallow-host-namespaces
      ruleNames: [host-namespaces, autogen-host-namespaces]
    - policyName: disallow-host-path
      ruleNames: [host-path, autogen-host-path]
    - policyName: disallow-host-ports
      ruleNames: [host-ports-none, autogen-host-ports-none]
    - policyName: disallow-privileged-containers
      ruleNames: [privileged-containers, autogen-privileged-containers]
    - policyName: disallow-selinux
      ruleNames: [selinux-type, autogen-selinux-type]
    - policyName: require-resource-limits
      ruleNames: [require-limits, autogen-require-limits]
    - policyName: require-ro-rootfs
      ruleNames: [require-ro-rootfs, autogen-require-ro-rootfs]
    - policyName: restrict-seccomp
      ruleNames: [check-seccomp, autogen-check-seccomp]
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all, adding-capabilities-strict, autogen-adding-capabilities-strict]
    - policyName: disallow-privilege-escalation
      ruleNames: [privilege-escalation, autogen-privilege-escalation]
    - policyName: require-run-as-nonroot
      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: restrict-seccomp-strict
      ruleNames: [check-seccomp-strict, autogen-check-seccomp-strict]
    - policyName: restrict-volume-types
      ruleNames: [restricted-volumes, autogen-restricted-volumes]
---
