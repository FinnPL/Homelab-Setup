{{- if .Values.unifiExporter.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.unifiExporter.secret.name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Values.unifiExporter.secret.name }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.unifiExporter.secret.remoteKey }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.unifiExporter.secret.remoteKey }}
        property: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-exporter
  labels:
    app.kubernetes.io/name: unifi-exporter
    app.kubernetes.io/part-of: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-exporter
        app.kubernetes.io/part-of: monitoring-stack
    spec:
      containers:
        - name: exporter
          image: "{{ .Values.unifiExporter.image.repository }}:{{ .Values.unifiExporter.image.tag }}"
          imagePullPolicy: {{ .Values.unifiExporter.image.pullPolicy }}
          env:
            - name: UP_UNIFI_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.unifiExporter.secret.name }}
                  key: username
            - name: UP_UNIFI_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.unifiExporter.secret.name }}
                  key: password
            - name: UP_UNIFI_DEFAULT_VERIFY_SSL
              value: {{ ternary "true" "false" .Values.unifiExporter.verifySsl | quote }}
            - name: UP_UNIFI_DEFAULT_SAVE_SITES
              value: {{ ternary "true" "false" .Values.unifiExporter.defaults.saveSites | quote }}
{{- range $controllerIdx, $controller := .Values.unifiExporter.controllers }}
            - name: {{ printf "UP_UNIFI_CONTROLLER_%d_ROLE" $controllerIdx }}
              value: {{ default (printf "controller-%d" $controllerIdx) $controller.role | quote }}
            - name: {{ printf "UP_UNIFI_CONTROLLER_%d_URL" $controllerIdx }}
              value: {{ $controller.url | quote }}
            - name: {{ printf "UP_UNIFI_CONTROLLER_%d_VERIFY_SSL" $controllerIdx }}
              value: {{ ternary "true" "false" $.Values.unifiExporter.verifySsl | quote }}
            - name: {{ printf "UP_UNIFI_CONTROLLER_%d_SAVE_SITES" $controllerIdx }}
              value: {{ ternary "true" "false" $.Values.unifiExporter.defaults.saveSites | quote }}
{{- range $siteIdx, $site := $controller.sites }}
            - name: {{ printf "UP_UNIFI_CONTROLLER_%d_SITE_%d" $controllerIdx $siteIdx }}
              value: {{ $site | quote }}
{{- end }}
{{- end }}
            - name: UP_PROMETHEUS_HTTP_LISTEN
              value: "0.0.0.0:{{ .Values.unifiExporter.service.port }}"
            - name: UP_PROMETHEUS_NAMESPACE
              value: {{ .Values.unifiExporter.metrics.namespace | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.unifiExporter.service.port }}
              protocol: TCP
          resources:
{{ toYaml .Values.unifiExporter.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-exporter
  labels:
    app.kubernetes.io/name: unifi-exporter
    app.kubernetes.io/part-of: monitoring-stack
spec:
  selector:
    app.kubernetes.io/name: unifi-exporter
  ports:
    - name: metrics
      port: {{ .Values.unifiExporter.service.port }}
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unifi-exporter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-exporter
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: {{ .Values.unifiExporter.metrics.path }}
      interval: {{ .Values.unifiExporter.metrics.interval }}
      scrapeTimeout: {{ .Values.unifiExporter.metrics.scrapeTimeout }}
{{- end }}
