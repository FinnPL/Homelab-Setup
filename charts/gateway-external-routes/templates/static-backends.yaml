{{- $namespace := .Values.namespace -}}
{{- $gateway := .Values.gateway -}}
{{- range .Values.staticBackends }}
{{- $backend := . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $backend.name }}-external
  namespace: {{ $namespace }}
spec:
  ports:
    - name: http
      port: {{ $backend.servicePort }}
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ $backend.name }}-external
  namespace: {{ $namespace }}
subsets:
  - addresses:
{{- range $backend.endpoints }}
      - ip: {{ . | quote }}
{{- end }}
    ports:
      - name: http
        port: {{ $backend.servicePort }}
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $backend.name }}
  namespace: {{ $namespace }}
spec:
  parentRefs:
    - name: {{ $gateway.name }}
      namespace: {{ $gateway.namespace }}
      sectionName: {{ $gateway.sectionName }}
  hostnames:
    - {{ $backend.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ $backend.name }}-external
          port: {{ $backend.servicePort }}
---
{{- end }}
