name: "Terraform: lint"

on:
  pull_request:
    paths:
      - "00-global/**"
      - "01-network/**"
      - "02-infrastructure/**"
      - "03-services/**"
      - "cloud-edge/**"
      - ".tflint.hcl"
      - ".github/workflows/terraform-lint.yaml"
  push:
    branches:
      - main
    paths:
      - "00-global/**"
      - "01-network/**"
      - "02-infrastructure/**"
      - "03-services/**"
      - "cloud-edge/**"
      - ".tflint.hcl"
      - ".github/workflows/terraform-lint.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl

jobs:
  fmt:
    name: "fmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.10.0"

      - name: Terraform fmt
        run: |
          for d in 00-global 01-network 02-infrastructure 03-services cloud-edge; do
            terraform fmt -check -recursive "$d"
          done

  tflint:
    name: "${{ matrix.layer }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer:
          - 00-global
          - 01-network
          - 02-infrastructure
          - 03-services
          - cloud-edge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          tflint_version: v0.63.1

      - name: Init TFLint plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --init --chdir=${{ matrix.layer }}

      - name: Run TFLint
        run: tflint --chdir=${{ matrix.layer }} --format compact
