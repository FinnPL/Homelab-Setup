---
apiVersion: v1
kind: Service
metadata:
  name: dns
  namespace: dns
  labels:
    app: dns
  annotations:
    io.cilium/lb-ipam-ips: "10.10.1.201" # Hardcoded to match Unifi DNS settings
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: dns
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53

---
apiVersion: v1
kind: Service
metadata:
  name: dns-metrics
  namespace: dns
  labels:
    app: dns
spec:
  type: ClusterIP
  selector:
    app: dns
  ports:
    - name: blocky-metrics
      protocol: TCP
      port: 4000
      targetPort: 4000
    - name: unbound-metrics
      protocol: TCP
      port: 9167
      targetPort: 9167
