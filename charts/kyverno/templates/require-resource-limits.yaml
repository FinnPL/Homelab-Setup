apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Requests and Memory Limit
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Every container must declare CPU and memory requests and a memory limit. 
      CPU limits are intentionally NOT required.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "CPU+memory requests and a memory limit are required on all containers."
        pattern:
          spec:
            =(ephemeralContainers):
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
            =(initContainers):
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
