name: "Charts: validate"

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "apps/**"
      - ".github/workflows/charts-validate.yaml"
  pull_request:
    paths:
      - "charts/**"
      - "apps/**"
      - ".github/workflows/charts-validate.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: "discover"
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.find.outputs.charts }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # need history to diff against the PR base

      - id: find
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # On a PR, render only charts whose own files (or matching apps/<name>.yaml)
          # changed. On push to main — or when this workflow itself changes — render all.
          render_all=0
          declare -A WANT
          if [ "$EVENT" = "pull_request" ]; then
            while IFS= read -r f; do
              case "$f" in
                .github/workflows/charts-validate.yaml) render_all=1 ;;
                charts/*/*) WANT["$(echo "$f" | cut -d/ -f2)"]=1 ;;
                apps/*.yaml) WANT["$(basename "$f" .yaml)"]=1 ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" HEAD)
          else
            render_all=1
          fi

          declare -A NS
          for app in apps/*.yaml; do
            ns=$(yq e '.spec.destination.namespace // ""' "$app")
            paths=$(yq e '([.spec.source.path] + (.spec.sources // [] | map(.path))) | .[] | select(. != null)' "$app")
            for p in $paths; do NS["$(basename "$p")"]="$ns"; done
          done

          entries=()
          for dir in charts/*/; do
            c=$(basename "$dir")
            if [ "$render_all" = "0" ] && [ -z "${WANT[$c]:-}" ]; then continue; fi
            ns="${NS[$c]:-$c}"; [ -z "$ns" ] && ns="$c"
            entries+=("$(jq -nc --arg n "$c" --arg s "$ns" '{name:$n, ns:$s}')")
          done
          if [ ${#entries[@]} -eq 0 ]; then
            charts='[]'
          else
            charts=$(printf '%s\n' "${entries[@]}" | jq -sc '.')
          fi
          echo "charts=$charts" >> "$GITHUB_OUTPUT"
          echo "$charts" | jq .

  render:
    name: "render: ${{ matrix.chart.name }}"
    needs: discover
    if: needs.discover.outputs.charts != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(needs.discover.outputs.charts) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install kubeconform
        env:
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION: "v0.6.7"
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin kubeconform
      - name: Fetch chart dependencies
        run: |
          d="charts/${{ matrix.chart.name }}"
          [ -f "$d/Chart.yaml" ] || { echo "plain manifest dir — no Helm deps"; exit 0; }
          helm dependency build "$d" || helm dependency update "$d"

      - name: Helm lint
        run: |
          d="charts/${{ matrix.chart.name }}"
          [ -f "$d/Chart.yaml" ] || { echo "plain manifest dir — skipping lint"; exit 0; }
          helm lint "$d"

      # Render into the real destination namespace
      - name: Render
        run: |
          d="charts/${{ matrix.chart.name }}"
          if [ -f "$d/Chart.yaml" ]; then
            helm template "${{ matrix.chart.name }}" "$d" --namespace "${{ matrix.chart.ns }}"
          else
            find "$d" -type f \( -name '*.yaml' -o -name '*.yml' \) \
              -exec sh -c 'for f; do cat "$f"; echo; echo "---"; done' _ {} +
          fi \
            | NS="${{ matrix.chart.ns }}" yq eval '
                select(.kind != null)
                | select((.metadata.annotations."helm.sh/hook" // "") | test("test") | not)
                | .metadata.namespace = (.metadata.namespace // strenv(NS))
              ' - \
            > "rendered-${{ matrix.chart.name }}.yaml"

      # -ignore-missing-schemas: own CRDs (e.g. database.lippok.dev)
      - name: Schema validation (kubeconform)
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            "rendered-${{ matrix.chart.name }}.yaml"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-${{ matrix.chart.name }}
          path: rendered-${{ matrix.chart.name }}.yaml

  kyverno:
    name: "kyverno"
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install Kyverno CLI
        env:
          # renovate: datasource=github-releases depName=kyverno/kyverno
          KYVERNO_VERSION: "v1.18.1"
        run: |
          echo "Installing Kyverno CLI ${KYVERNO_VERSION}"
          curl -fsSL "https://github.com/kyverno/kyverno/releases/download/${KYVERNO_VERSION}/kyverno-cli_${KYVERNO_VERSION}_linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin kyverno

      - name: Download rendered manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rendered-*
          path: rendered
          merge-multiple: true

      - name: Render policies & exceptions
        run: |
          helm dependency build charts/kyverno || helm dependency update charts/kyverno
          helm template kyverno charts/kyverno --namespace kyverno > kyverno-rendered.yaml
          yq eval 'select(.kind == "ClusterPolicy" or .kind == "Policy")' kyverno-rendered.yaml > policies.yaml
          yq eval 'select(.kind == "PolicyException")' kyverno-rendered.yaml > exceptions.yaml
          echo "Policies:";   grep -c '^kind:' policies.yaml || true
          echo "Exceptions:"; grep -c '^kind:' exceptions.yaml || true

      # Every chart except kyverno itself becomes a resource to test
      - name: Assemble workload resources
        run: |
          : > resources.yaml
          for f in rendered/rendered-*.yaml; do
            [ "$(basename "$f")" = "rendered-kyverno.yaml" ] && continue
            cat "$f" >> resources.yaml
            echo '---' >> resources.yaml
          done

      # Same policies + exceptions the cluster enforces at admission.
      # --continue-on-fail so one run reports every violation, not just the first.
      - name: Kyverno apply
        run: |
          kyverno apply policies.yaml \
            --resource resources.yaml \
            --exception exceptions.yaml \
            --continue-on-fail
