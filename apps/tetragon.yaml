apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/FinnPL/Homelab-Setup.git
    targetRevision: main
    path: charts/tetragon
  destination:
    server: https://kubernetes.default.svc
    namespace: tetragon
  ignoreDifferences:
    - group: cilium.io
      kind: TracingPolicy
      jqPathExpressions:
        - '.spec.kprobes[].return'
        - '.spec.kprobes[].args[]?.maxData'
        - '.spec.kprobes[].args[]?.resolve'
        - '.spec.kprobes[].args[]?.returnCopy'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
