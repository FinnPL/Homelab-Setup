apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/rancher/local-path-provisioner/charts
    chart: local-path-provisioner
    targetRevision: 0.0.35
    helm:
      valuesObject:
        storageClass:
          name: local-path
          create: true
          defaultClass: false
          defaultVolumeType: local
        tolerations:
          - key: dedicated
            operator: Equal
            value: database
            effect: NoSchedule
        helperPod:
          tolerations:
            - key: dedicated
              operator: Equal
              value: database
              effect: NoSchedule
        nodePathMap:
          - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
            paths: []
          - node: talos-worker-db
            paths:
              - /var/lib/local-path-provisioner
        podSecurityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
