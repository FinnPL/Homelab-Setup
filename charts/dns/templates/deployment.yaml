apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns
  namespace: dns
  labels:
    app: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns
  template:
    metadata:
      labels:
        app: dns
    spec:

      # Prefer worker nodes but tolerate control-plane as a fallback
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist

      securityContext:
        fsGroup: 1000

      initContainers:
        - name: generate-root-key
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              apk add --no-cache unbound
              unbound-anchor -a /tmp/unbound/root.key || true
              chown 1000:1000 /tmp/unbound/root.key
          volumeMounts:
            - name: unbound-data
              mountPath: /tmp/unbound
          securityContext:
            runAsUser: 0

      # Blocky: filtering, caching
      containers:
        - name: blocky
          image: spx01/blocky:v0.24
          imagePullPolicy: IfNotPresent

          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 4000
              protocol: TCP

          env:
            - name: TZ
              value: Europe/Berlin

          volumeMounts:
            - name: blocky-config
              mountPath: /app/config.yml
              subPath: config.yml
              readOnly: true
            - name: blocky-tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /api/blocking/status
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/blocking/status
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]

        # Unbound: DNSSEC-validating with DoT forwarding
        # Listens on 127.0.0.1:5335, only reachable by Blocky inside this pod
        - name: unbound
          image: madnuttah/unbound:1.24.2-1
          imagePullPolicy: IfNotPresent

          command: ["unbound"]
          args: ["-d", "-c", "/usr/local/unbound/unbound.conf"]

          ports:
            - name: dns-local
              containerPort: 5335
              protocol: UDP

          volumeMounts:
            - name: unbound-config
              mountPath: /usr/local/unbound/unbound.conf
              subPath: unbound.conf
              readOnly: true
            - name: unbound-data
              mountPath: /tmp/unbound

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          readinessProbe:
            exec:
              command:
                - unbound-control
                - status
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - unbound-control
                - status
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: blocky-config
          configMap:
            name: blocky-config

        - name: blocky-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

        - name: unbound-config
          configMap:
            name: unbound-config

        - name: unbound-data
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
