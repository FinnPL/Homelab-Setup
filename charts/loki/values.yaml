loki:
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    auth_enabled: false
  deploymentMode: SingleBinary
  
  singleBinary:
    replicas: 1
    nodeSelector:
      dedicated: "database"
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: "local-path" 
      size: 10Gi

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  
  gateway:
    enabled: false
  minio:
    enabled: false