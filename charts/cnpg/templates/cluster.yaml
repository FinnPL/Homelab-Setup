apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster
spec:
  instances: 1
  enableSuperuserAccess: true
  superuserSecret:
    name: crossplane-pg-credentials

  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      max_connections: "70"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  storage:
    size: 10Gi
    storageClass: local-path

  affinity:
    nodeSelector:
      dedicated: database
    tolerations:
      - key: dedicated
        operator: Equal
        value: database
        effect: NoSchedule
