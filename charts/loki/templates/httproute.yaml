apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway
  hostnames:
    - loki.lippok.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /loki
      backendRefs:
        - name: loki
          port: 3100
