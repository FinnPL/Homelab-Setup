apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.8.1
    helm:
      values: |
        crds:
          annotations:
            argocd.argoproj.io/sync-options: ServerSideApply=true
        features:
          policyExceptions:
            enabled: true
            namespace: kyverno
        config:
          webhookAnnotations:
            admissions.enforcer/disabled: "true"
          webhookLabels: {}
          excludeUsernames:
            - "system:serviceaccount:kube-system:generic-garbage-collector"
        admissionController:
          replicas: 1
          priorityClassName: system-cluster-critical
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 384Mi
          container:
            # Flip forceFailurePolicyIgnore to "false" once confident in the policy set.
            extraArgs:
              webhookTimeout: "10"
              forceFailurePolicyIgnore: "true"
              v: "0"
        backgroundController:
          replicas: 1
          priorityClassName: system-cluster-critical
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          extraArgs:
            v: "0"
        cleanupController:
          replicas: 1
          priorityClassName: system-cluster-critical
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          extraArgs:
            v: "0"
        reportsController:
          replicas: 1
          priorityClassName: system-cluster-critical
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          extraArgs:
            v: "0"
          rbac:
            clusterRole:
              extraResources:
                - apiGroups: ["networking.k8s.io"]
                  resources: ["ingressclasses"]
                  verbs: ["get", "list", "watch"]
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: deletingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: generatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: imagevalidatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: mutatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespaceddeletingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedgeneratingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedimagevalidatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedmutatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedvalidatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: policyexceptions.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: validatingpolicies.policies.kyverno.io
      jsonPointers: [/metadata/labels, /metadata/annotations]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
