      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: restrict-seccomp-strict
      ruleNames: [check-seccomp-strict, autogen-check-seccomp-strict]
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kube-system-csi-nfs
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      csi-nfs-node mounts NFS shares onto the host (hostPath, privileged,
      CAP_SYS_ADMIN, mount propagation Bidirectional). csi-nfs-controller
      needs hostNetwork to talk to the kubelet. Required for a working
      RWX CSI driver.
spec:
  match:
    any:
      - resources:
          namespaces: [kube-system]
          kinds: [Pod, ReplicaSet, Deployment, DaemonSet]
          names: [csi-nfs-node, csi-nfs-node-*, csi-nfs-controller, csi-nfs-controller-*]
  exceptions:
    - policyName: disallow-capabilities
      ruleNames: [adding-capabilities, autogen-adding-capabilities]
    - policyName: disallow-host-namespaces
      ruleNames: [host-namespaces, autogen-host-namespaces]
    - policyName: disallow-host-path
      ruleNames: [host-path, autogen-host-path]
    - policyName: disallow-host-ports
      ruleNames: [host-ports-none, autogen-host-ports-none]
    - policyName: disallow-privileged-containers
      ruleNames: [privileged-containers, autogen-privileged-containers]
    - policyName: require-ro-rootfs
      ruleNames: [require-ro-rootfs, autogen-require-ro-rootfs]
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all, adding-capabilities-strict, autogen-adding-capabilities-strict]
    - policyName: disallow-privilege-escalation
      ruleNames: [privilege-escalation, autogen-privilege-escalation]
    - policyName: require-run-as-nonroot
      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: restrict-volume-types
      ruleNames: [restricted-volumes, autogen-restricted-volumes]
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kube-system-talos-static-pods
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      kube-apiserver, kube-controller-manager and kube-scheduler are Talos
      static pods. They run with hostNetwork, mount /etc/kubernetes from
      the host, and lack memory limits or readOnlyRootFilesystem.
spec:
  match:
    any:
      - resources:
          namespaces: [kube-system]
          kinds: [Pod]
          names: [kube-apiserver-*, kube-controller-manager-*, kube-scheduler-*]
  exceptions:
    - policyName: disallow-host-namespaces
      ruleNames: [host-namespaces]
    - policyName: disallow-host-path
      ruleNames: [host-path]
    - policyName: require-resource-limits
      ruleNames: [require-limits]
    - policyName: require-ro-rootfs
      ruleNames: [require-ro-rootfs]
    - policyName: restrict-volume-types
      ruleNames: [restricted-volumes]
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: argocd-repo-server
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      The fix-nfs-permissions init container runs as root with CAP_CHOWN +
      CAP_FOWNER to chown an RWX NFS volume to uid 999 before the repo-server
      can write to it. NFS exports don't honor fsGroup, so the chown must
      happen in-pod. The init and main containers ship without a
      seccompProfile set.
spec:
  match:
    any:
      - resources:
          namespaces: [argocd]
          kinds: [Pod, ReplicaSet, Deployment]
          names: [argocd-repo-server, argocd-repo-server-*]
  exceptions:
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all, adding-capabilities-strict, autogen-adding-capabilities-strict]
    - policyName: require-run-as-nonroot
      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: require-run-as-non-root-user
      ruleNames: [run-as-non-root-user, autogen-run-as-non-root-user]
    - policyName: restrict-seccomp-strict
      ruleNames: [check-seccomp-strict, autogen-check-seccomp-strict]
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: monitoring-alloy-agent
  namespace: kyverno
  annotations:
    policies.kyverno.io/description: >-
      alloy-agent is a hostNetwork DaemonSet that binds syslog hostPorts
      (5140/5141/5142) and mounts /var/log + /var/log/pods to tail container
      logs for Loki. The alloy container runs as root because a non-root uid
      cannot reliably read the root-owned host log files.
spec:
  match:
    any:
      - resources:
          namespaces: [monitoring]
          kinds: [Pod, DaemonSet]
          selector:
            matchLabels:
              app.kubernetes.io/name: alloy-agent
              app.kubernetes.io/instance: alloy
  exceptions:
    - policyName: disallow-host-namespaces
      ruleNames: [host-namespaces, autogen-host-namespaces]
    - policyName: disallow-host-path
      ruleNames: [host-path, autogen-host-path]
    - policyName: disallow-host-ports
      ruleNames: [host-ports-none, autogen-host-ports-none]
    - policyName: require-run-as-nonroot
      ruleNames: [run-as-non-root, autogen-run-as-non-root]
    - policyName: require-run-as-non-root-user
      ruleNames: [run-as-non-root-user, autogen-run-as-non-root-user]
    - policyName: restrict-volume-types
      ruleNames: [restricted-volumes, autogen-restricted-volumes]
---
