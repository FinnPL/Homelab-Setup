name: "Terraform: 01-network"

on:
  workflow_call:
  pull_request:
    paths:
      - "01-network/**"
      - ".github/workflows/01-network.yaml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (dangerous)"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: Terraform
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('terraform-network-pr-{0}', github.event.pull_request.number) || 'terraform-network' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: ./01-network
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_unifi_api_key: ${{ secrets.UNIFI_API_KEY }}
      TF_VAR_unifi_api_url: ${{ vars.UNIFI_API_URL }}
      TF_VAR_unifi_insecure: ${{ vars.UNIFI_INSECURE }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -lock-timeout=10m -out .planfile -input=false
        continue-on-error: true

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@2d41e908725447b1677913001dfb92fa7010c025 # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          planfile: .planfile
          working-directory: ./01-network
          header: "Terraform Plan (01-network)"

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && inputs.apply == true)
        run: terraform apply -lock-timeout=10m -auto-approve -input=false
