name: "Minerva: deploy"

on:
  push:
    branches:
      - main
    paths:
      - "minerva/**"
      - ".github/workflows/minerva-deploy.yaml"

concurrency:
  group: minerva-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: pi3
    environment: Pi3
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Clear Env File
        run: echo "" > minerva/.env

      - name: Set up Env File
        run: |
          echo 'TAILSCALE_AUTHKEY=${{ secrets.TAILSCALE_AUTHKEY }}' >> minerva/.env

      - name: Pull latest images
        run: docker compose --env-file minerva/.env -f minerva/docker-compose.yml pull

      - name: Stop existing containers
        run: docker compose --env-file minerva/.env -f minerva/docker-compose.yml down || true

      - name: Start containers
        run: docker compose --env-file minerva/.env -f minerva/docker-compose.yml up -d
