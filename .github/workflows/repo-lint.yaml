name: "Repo: lint"

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    name: "pre-commit"
    runs-on: ubuntu-latest
    env:
      SKIP: terraform_fmt,terraform_validate,terraform_tflint,terraform_trivy # are handled in the terraform-lint workflow
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
